name: Backend CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore FixFlow.slnx

      - name: Build solution
        run: dotnet build FixFlow.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test FixFlow.slnx --configuration Release --no-build